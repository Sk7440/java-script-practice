    <h1>Digital clock</h1>
    <div
      style="
        display: flex;
        align-items: center;
        justify-content: space-around;
        gap: 20px;
        width: 300px;
      "
    >
      <h3>Hour</h3>
      <h3>Minute</h3>
      <h3>Second</h3>
    </div>
    <div
      style="
        display: flex;
        gap: 20px;
        width: 300px;
        border: 2px solid crimson;
        justify-content: space-around;
        align-items: center;
      "
    >
      <p id="result"></p>
      <p id="result1"></p>
      <p id="result2"></p>
    </div>

    <script>
      //////analog clock
      setInterval(() => {
        let minute = document.getElementById("minute");
        let second = document.getElementById("seconds");
        let hour = document.getElementById("hours");
        let date = new Date();
        let seconds = date.getSeconds();
        let minutes = date.getMinutes();
        let hours = date.getHours();
        // console.log(seconds);
        // console.log(minutes);
        if (hours > 12) {
          hours = hours - 12;
        }
        second.style.transform = `rotate(${seconds * 6}deg)`;
        minute.style.transform = `rotate(${minutes * 6}deg)`;
        hour.style.transform = `rotate(${hours * 30}deg)`;
        console.log(hours);
      }, 1000);

      ///////digital clock
      setInterval(() => {
        let result = document.getElementById("result");
        let result1 = document.getElementById("result1");
        let result2 = document.getElementById("result2");
        let minute = document.getElementById("minute");
        let second = document.getElementById("seconds");
        let hour = document.getElementById("hours");
        let date = new Date();
        let seconds = date.getSeconds();
        let minutes = date.getMinutes();
        let hours = date.getHours();
        // console.log(seconds);
        // console.log(minutes);
        if (hours > 12) {
          hours = hours - 12;
        }
        result2.textContent = seconds;
        result1.textContent = minutes;
        result.textContent = hours;
        // minute.style.transform = `rotate(${minutes * 6}deg)`;
        // hour.style.transform = `rotate(${hours * 30}deg)`;
        // console.log(hours);
      }, 1000);
    </script>
