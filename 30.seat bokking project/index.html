<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 30px;
    }

    body > h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.3rem;
      letter-spacing: 1px;
    }

    /* Stats Section */

    body > div {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 35px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* Top Cards Only */

    body > div > div {
      flex: 1;
      min-width: 180px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: #fff;
    }

    body > div > .available {
      background: #14532d;
    }

    body > div > .reserved {
      background: #7f1d1d;
    }

    body > div > .book {
      background: #1d4ed8;
    }

    .available h1,
    .reserved h1,
    .book h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .available span,
    .reserved span,
    .book span {
      display: block;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .available i,
    .reserved i,
    .book i {
      font-size: 34px;
    }

    /* Seats Container */

    .seats {
      width: 100%;
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 15px;
      list-style: none;
    }

    /* Individual Seat */

    .seat {
      height: 70px;
      background: #14532d;
      border: 1px solid #334155;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.25s;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .seat:hover {
      transform: translateY(-4px);
      background: #334155;
    }

    .seat i {
      margin-top: 5px;
      font-size: 24px;
      color: #d1d5db;
      transition: 0.25s;
    }

    /* Reserved Seat */

    .seat.reserved {
      background: #451a1a;
      border-color: #ef4444;
    }

    .seat.reserved i {
      color: #ef4444;
    }

    /* Booked Seat */

    .seat.booked {
      background: #1e3a8a;
      border-color: #3b82f6;
    }

    .seat.booked i {
      color: #60a5fa;
    }

    /* Mobile */

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      body > h1 {
        font-size: 2rem;
      }

      body > div {
        flex-direction: column;
      }

      .available,
      .reserved,
      .book {
        width: 100%;
      }

      .seats {
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      }

      .seat {
        height: 65px;
      }
    }
    /* Container styling to center or place it nicely */
    .movie-select-container {
      position: relative;
      width: 280px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 20px auto;
    }

    /* The actual select element */
    #movie {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      background-color: #ffffff;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      appearance: none; /* Removes default browser styling */
      -webkit-appearance: none;
      -moz-appearance: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
    }

    /* Custom dropdown arrow */
    .movie-select-container::after {
      content: "▼";
      font-size: 12px;
      color: #6c757d;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      transition: transform 0.3s ease;
    }

    /* Hover and Focus States */
    #movie:hover {
      border-color: #adb5bd;
    }

    #movie:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }

    /* Rotate arrow on focus (optional polish) */
    #movie:focus + .movie-select-container::after,
    .movie-select-container:focus-within::after {
      transform: translateY(-50%) rotate(180deg);
      color: #4f46e5;
    }

    /* Option styling */
    #movie option {
      padding: 10px;
      color: #333;
    }
    /* Styling for the total cost heading */
    .total-cost {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: #333333;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 16px 20px;
      border-radius: 10px;
      border-left: 5px solid #4f46e5;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      margin: 20px auto;
      max-width: 280px; /* Matches the dropdown width for a clean stacked look */
      text-align: center;
      transition: all 0.3s ease;
    }

    /* Highlight the dynamic price value */
    .total-cost span,
    .total-cost strong {
      color: #4f46e5;
      font-weight: 700;
    }
  </style>
  <body>

    <div>

      li.forEach((elee, idxx) => {

        if (A) {
          elee.classList.add("booked");
        }
        console.log(A);
      });
      select.addEventListener("change", () => {
        localStorage.setItem("selectvalue", select.value);

        result.innerHTML = `<h2 class="total-cost">Your total cost is <span>${array.length * Number(select.value)}$</span>.</h2>`;
      });
      select.value = localStorage.getItem("selectvalue");
      result.innerHTML = `<h2 class="total-cost">Your total cost is <span>${array.length * Number(select.value)}$</span>.</h2>`;
    </script>
  </body>
</html>
