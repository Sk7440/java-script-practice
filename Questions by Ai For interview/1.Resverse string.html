  <body>
    <script>
      function reverseString(str) {
        let reversed = "";

        for (let i = str.length - 1; i >= 0; i--) {
          // reversed =reversed+ str[i]
          // or also be written as a
          reversed += str[i];
        }

        return reversed;
      }
      console.log(reverseString("Linkedin"));
      

// built in method for Array
// .split("")
// .reverse()
  // .join("")

      console.log('linkedin'.split('').reverse().join(""));

    </script>
  </body>
