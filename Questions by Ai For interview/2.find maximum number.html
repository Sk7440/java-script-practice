<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>find maximum number</title>
  </head>
  <body>
    <script>
      ///// through loop
      let numbers = [9, 45, 7, 89, 23];
      let max = numbers[0];

      for (let i = 0; i < numbers.length; i++) {
        if (numbers[i] > max) {
          max = numbers[i];
        }
      }

      console.log(max);
      ///// through function
      function findmax(arr) {
        let max = arr[0];
        for (let i = 0; i < arr.length; i++) {
          if (arr[i] > max) {
            max = arr[i];
          }
        }
        return max;
      }
      console.log(findmax(numbers));
    </script>
  </body>
</html>
