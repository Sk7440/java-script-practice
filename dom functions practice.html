<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="red()">click me</button>
    <button onclick="green()" >click me</button>
    <button onclick="blue()">click me</button>
    <button onclick="yellow()">click me</button>
    <button onclick="purple()">click me</button>
    <script>
      let btn =document.getElementsByTagName('button')
      console.log(btn);
      btn[0].textContent='red'
      btn[1].textContent='green'
      btn[2].textContent='blue'
      btn[3].textContent='yellow'
      btn[4].textContent='purple'
  
      function red() {
            document.body.style.backgroundColor = 'red'
            
        }
      function green() {
            document.body.style.backgroundColor = 'green'
            
        }
      function blue() {
            document.body.style.backgroundColor = 'blue'
            
        }
      function yellow() {
            document.body.style.backgroundColor = 'yellow'
            
        }
      function purple() {
            document.body.style.backgroundColor = 'purple'
            
        }
      
  
  </script>
  </body>
</html>
