<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>0</h1>
    <button class="inc">increment</button>
    <button class="dec">decrement</button>
    <button class="r">reset</button>
    <script>
      let inc = document.querySelector(".inc");
      let dec = document.querySelector(".dec");
      let r = document.querySelector(".r");
      let h1 = document.querySelector("h1");
      let count = localStorage.getItem("countValue") || 0;
      h1.textContent = count;

      inc.addEventListener("click", () => {
        count++;
        localStorage.setItem("countValue", count);
        h1.textContent = count;
      });
      dec.addEventListener("click", () => {
        count--;
        localStorage.setItem("countValue", count);
        h1.textContent = count;
      });
      r.addEventListener("click", () => {
        localStorage.removeItem("countValue") ;
        count = 0;
        h1.textContent = 0;
      });
    </script>
  </body>
</html>
