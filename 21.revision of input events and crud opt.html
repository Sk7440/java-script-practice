<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="" id="form">
      <input type="text" name="" id="name" />
      <input type="number" name="" id="price" />

      <button type="submit" id="btn">submit</button>
    </form>
    <div id="output"></div>
    <script>
      let form = document.querySelector("#form");
      let pName = document.querySelector("#name");
      let pPrice = document.querySelector("#price");
      let btn = document.querySelector("#btn");

      let output = document.querySelector("#output");
      let product = [];

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (editingIndex !== null) {
            product[editingIndex].price = pPrice.value
            product[editingIndex].name = pName.value
            editingIndex = null
            Render()
        btn.textContent="submit"
        }
        else{
            console.log("form submitted");
            console.log(pName.value);
            console.log(pPrice.value);
    
            product.push({
              name: pName.value,
              price: pPrice.value,
            });
            Render();
            console.log(product);

        }
      });

      function Render() {
        output.innerHTML = "";
        product.forEach((ele, idx) => {
          output.innerHTML += `<div>
                
                <h1>name:${ele.name}</h1>
                <h2>price:${ele.price}</h2>
        <button onclick="Delete(${idx})">x</button>
        <button onclick="Edit(${idx})">Edit</button>
                </div>`;
          pName.value = "";
          pPrice.value = "";
        });
      }
      let editingIndex = null;
      function Delete(del) {
        product = product.filter((ele, idx) => {
          return idx !== del;
        });
        Render();
      }
      function Edit(edit) {
        let idxedit = product.find((ele, idx) => {
          return idx == edit;
        });
        pName.value = idxedit.name;
        pPrice.value = idxedit.price;
        btn.textContent = "UPDATE";
        editingIndex = edit
      }
    </script>
  </body>
</html>
