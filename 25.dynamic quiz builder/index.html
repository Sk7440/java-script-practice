<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    form{
   align-items: center;
      justify-content: center;
      display: flex;
      flex-direction: column;
    }
    body {
      background-color: #72352318;
    }
    div {
   
      width: 100%;
      
    }
    div input {
      margin: 10px;
      padding: 16px 30px;
      border-radius: 20px;
      border: hidden;
    }
    h1 {
      color: palevioletred;
      text-align: center;
    }
    button {
      margin: 20px;
      padding: 16px;
      border: hidden;
      transition: 0.4s;
      border-radius: 20px;
      background-color: palevioletred;
    }
    button:hover {
      background-color: #85896485;
    }
    .build-mode{
      display: none;
    }
    .play-mode{
      display: none;
    }
    .welcome{
      display: none;
    }
    .play-mode.active{
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;

    }

    .welcome.active{
      display: flex;

    }
    
    .build-mode.active{
      display: flex;
      flex-direction: column;

    }
    
    .ans-main{
      display: flex;
      align-items: center;
      justify-content: center;
    }
    

    </style>
  <body>
    <section class="welcome active" style="justify-items: center; align-items: center; flex-direction: column;font-size: 26px;">
      <h1>Welcome to Dynamic Quiz Builder</h1>
      <p>Select your Mode</p>
<button style="font-size: 20px;" id="build-mode">Build mode</button>
<button style="font-size: 20px;" id="play-mode">Play mode</button>
</section>
    <section class="build-mode">
      
      <h1>Dynamic quiz builder</h1>
      
      <div>
        <form action="" id="form">

            <input id="question" type="text" placeholder="Enter your question" />
            <input id="opt1" type="text" placeholder="Enter your option" />
      <input id="opt2" type="text" placeholder="Enter your option" />
      <input id="opt3" type="text" placeholder="Enter your option" />
      <input id="opt4" type="text" placeholder="Enter your option" />
      <h3>select your correct option</h3>
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: center;" >
          <label for="a">
              <input  name="s" class="inp" id="a" value="0" type="radio" />
          A
        </label>
        <label for="b">
          <input name="s" class="inp" id="b" value="1" type="radio" />
          B
        </label>
        <label for="c">
          <input  name="s" class="inp" id="c" value="2" type="radio" />
          C
        </label>
        <label for="d">
          <input name="s" class="inp" id="d" value="3" type="radio" />
          D
        </label>
      </div>
      <button id="submit">Submit</button>
      <button style="font-size: 20px;" id="play-mode">finish build mode</button>
    </div>
</form>
</section>
<section class="play-mode">
  <h1>Play Mode Question</h1>
  <button class="start-btn">Start Quiz</button>
  <h3 class="ques-main"></h3>
  <div class="ans-main"></div>
  <button class="next"> Next </button>
<h3>Your Score is <span id="score">0</span></h3>
<h3>Current Question <span id="cq">0</span></h3>
<h3>Total Questions <span id="tq">0</span></h3>
</section>


<script>
        let question = document.querySelector("#question");
        let welcome = document.querySelector('.welcome')
       let form=document.querySelector("#form")
        let opt1=document.querySelector("#opt1")
        let opt2=document.querySelector("#opt2")
        let opt3=document.querySelector("#opt3")
        let opt4=document.querySelector("#opt4")
        let btn=document.querySelector("#submit")
       let inp = document.querySelector(".inp")
       let buildMode= document.querySelector("#build-mode")
      let playMode=document.querySelector("#play-mode")
       let bSection=document.querySelector(".build-mode")
let pSection=document.querySelector(".play-mode")
let liveScore=document.querySelector("#score")
let currentQ=document.querySelector("#cq")
let totalQ=document.querySelector("#tq")
       let quiz=[];
       
       form.addEventListener("submit",(e)=>{
        e.preventDefault()
           let selectedInp = document.querySelectorAll("input[type='radio']")       

           let checked;

           selectedInp.forEach((ele,idx)=>{
            if(ele.checked == true){
              checked=ele

            }
          })
          
          
          quiz.push({
            question:question.value,
            options:[
              opt1.value,
              opt2.value,
              opt3.value,
              opt4.value,
            ],
            correct: checked.value
            
          })
          localStorage.setItem("quiz",JSON.stringify(quiz))   
          question.value=""     
          options:[
              opt1.value="",
              opt2.value="",
              opt3.value="",
              opt4.value="",
            ],

        console.log(quiz);
            
        
        })
       buildMode.addEventListener("click",()=>{
        bSection.classList.add('active')
        welcome.classList.remove('active')
       })
       playMode.addEventListener("click",()=>{
        pSection.classList.add('active')
        welcome.classList.remove('active')
       })
       
  let nextBtn = document.querySelector('.next')
        let qHeading = document.querySelector('.ques-main')
        let startBtn = document.querySelector('.start-btn')
        let ansMain = document.querySelector('.ans-main')
        let questions
        let index =0
        startBtn.addEventListener("click",()=>{
      

  questions=JSON.parse(localStorage.getItem('quiz'))  
  
  Render()  
  currentQ.textContent=index +1
  totalQ.textContent=questions.length       

        })
        function Render() {
          
          
          let oneQuestion= questions[index]
          qHeading.textContent = oneQuestion.question
          ansMain.innerHTML=""
       oneQuestion.options.forEach((ele,idx)=>{
  
        ansMain.innerHTML += 
  `<label for="${idx}">
              <input class="ans-options"  name="s" id="${idx}" value="${idx}" type="radio" />
          ${ele}
        </label>
  `
      
        
       })
       
       


          // oneQuestion.options
          // console.log(oneQuestion.options);
        
        }
  let score = 0
  nextBtn.addEventListener('click', function () {
    let radioInputs = document.querySelectorAll('.ans-options')
          console.log(radioInputs);
          
            let checkedInp;
            radioInputs.forEach((ele, idx) => {
                if (ele.checked == true) {
                   checkedInp = ele
                }
            })
            console.log(checkedInp.value);
            if (questions[index].correct == checkedInp.value) {
                score++
                liveScore.textContent=score
            }
            console.log(score);

            if (index == questions.length - 1) {
            alert("Quiz are end please go to build mode")}
            else {
                index++
                Render()

              }

        })
    </script>
  </body>
</html>
